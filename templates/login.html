<!DOCTYPE html>
<html>
<head>
    <title>ACE Login</title>

    <meta name="google-adsense-account" content="ca-pub-478039175540164">
    <link rel="icon" type="image/png" href="/static/favicon.png">

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: radial-gradient(circle at top, #0f172a, #020617);
            font-family: "Segoe UI", sans-serif;
            color: #e5e7eb;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box {
            width: 340px;
            padding: 30px;
            border-radius: 12px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        h2 {
            margin-bottom: 20px;
            font-weight: 500;
            color: #9ca3af;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 12px;
            background: #020617;
            border: 1px solid #1f2937;
            color: white;
            border-radius: 6px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #2563eb;
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        .hint {
            margin-top: 12px;
            font-size: 12px;
            color: #6b7280;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>ACE ACCESS</h2>

    <form method="POST">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>

        <button>Enter System</button>
    </form>

    <div class="hint">
        New user? Just enter anything — account is created automatically.
    </div>
</div>

</body>
</html>
