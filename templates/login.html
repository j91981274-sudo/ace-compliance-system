<!DOCTYPE html>
<html>

<head>
    <title>ACE Login</title>

    <meta name="google-adsense-account" content="ca-pub-478039175540164">

    <link rel="icon" type="image/png" href="/static/favicon.png">

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: #0b0f1a;
            font-family: "Segoe UI", sans-serif;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            width: 320px;
            padding: 30px;
            background: #12172a;
            border-radius: 10px;
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            background: #0b0f1a;
            border: 1px solid #1f2937;
            color: white;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #1f2937;
            border: none;
            color: white;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="login-box">
    <h2>LOGIN</h2>

    <form method="POST">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>

        <button>ENTER</button>
    </form>
</div>

</body>
</html>
