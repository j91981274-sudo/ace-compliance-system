<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ACE Login</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: #020617;
    font-family: Inter, sans-serif;
    color: #e5e7eb;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* container */
.login-box {
    width: 320px;
    padding: 30px;
    border-radius: 16px;
    background: rgba(15, 23, 42, 0.9);
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

/* title */
h2 {
    margin-bottom: 20px;
    font-weight: 500;
}

/* inputs */
input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #1e293b;
    background: #020617;
    color: white;
}

/* button */
button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border: none;
    border-radius: 8px;
    background: #00ff88;
    font-weight: 600;
    cursor: pointer;
}

button:hover {
    background: #00cc6a;
}

/* footer */
.footer {
    margin-top: 15px;
    font-size: 12px;
    color: #6b7280;
    text-align: center;
}
</style>

</head>

<body>

<div class="login-box">

    <h2>ACE System Login</h2>

    <form method="POST">
        <input name="username" placeholder="Username" required>
        <input name="password" type="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <div class="footer">
        Internal Compliance Access
    </div>

</div>

</body>
</html>
