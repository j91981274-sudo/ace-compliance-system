<!DOCTYPE html>
<html>

<head>
    <title>ACE Core</title>

    <!-- ADSENSE -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-478039175540164"
    crossorigin="anonymous"></script>

    <link rel="icon" type="image/png" href="/static/favicon.png">

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: #0b0f1a;
            font-family: "Segoe UI", sans-serif;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            width: 320px;
            padding: 30px;
            background: #12172a;
            border-radius: 12px;
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            background: #1a1f35;
            color: white;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            background: #00c6ff;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #00a8e0;
        }

        .footer {
            margin-top: 15px;
            font-size: 12px;
            color: #777;
            text-align: center;
        }
    </style>
</head>

<body>

<div class="login-box">

    <h2>ACE System Login</h2>

    <form method="POST">
        <input name="username" placeholder="Username" required>
        <input name="password" type="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <div class="footer">
        Internal Compliance Access
    </div>

</div>

</body>
</html>
