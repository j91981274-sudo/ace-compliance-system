<!DOCTYPE html>
<html>
<head>
    <title>ACE Compliance System</title>

    <link rel="icon" type="image/png" href="/static/favicon.png">

    <style>
        body {
            margin: 0;
            background: radial-gradient(circle at top, #0f172a, #020617);
            font-family: "Segoe UI", sans-serif;
            color: #e5e7eb;
        }

        .container {
            text-align: center;
            padding: 120px 20px;
        }

        h1 {
            font-size: 40px;
            margin-bottom: 10px;
        }

        p {
            color: #9ca3af;
            margin-bottom: 30px;
        }

        button {
            padding: 12px 20px;
            background: #2563eb;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        .features {
            margin-top: 80px;
            display: flex;
            justify-content: center;
            gap: 40px;
        }

        .card {
            width: 250px;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>

<body>

<div class="container">

    <h1>⚡ ACE Compliance System</h1>
    <p>Real-time transaction monitoring and fraud detection</p>

    <a href="/login">
        <button>Enter Dashboard</button>
    </a>

    <div class="features">

        <div class="card">
            <h3>Real-Time Detection</h3>
            <p>Analyze transactions instantly</p>
        </div>

        <div class="card">
            <h3>Risk Scoring</h3>
            <p>Automatically flag suspicious activity</p>
        </div>

        <div class="card">
            <h3>Export Data</h3>
            <p>Download reports with premium access</p>
        </div>

    </div>

</div>

</body>
</html>
