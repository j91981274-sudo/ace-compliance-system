<!DOCTYPE html>
<html>

<head>

    <meta name="google-adsense-account" content="ca-pub-478039175540164">

    <link rel="icon" type="image/png" href="/static/favicon.png">

    <style>
        body {
            background: #020617;
            color: white;
            font-family: sans-serif;
            padding: 30px;

        h2 {
            margin-bottom: 20px;
        }

        input, button {
            padding: 10px;

            width: 250px;
            border-radius: 6px;
            border: none;
            background: #111827;
            color: white;
        }

<h2>CONFIG SETTINGS</h2>

<form method="POST">
    <label>High Amount Threshold</label><br>
    <input type="number" name="high_amount" value="{{ cfg.high_amount }}" required><br>

    <button type="submit">SAVE</button>
</form>

<br>

<a href="/dashboard">
    <button>BACK TO DASHBOARD</button>
</a>
