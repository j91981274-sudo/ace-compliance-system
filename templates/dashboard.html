<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { background:#020617; color:#fff; font-family:Inter; }
.container { width:90%; margin:auto; }

.header { display:flex; justify-content:space-between; margin:20px 0; }

.stats { display:flex; gap:15px; }
.card { flex:1; padding:20px; background:#0f172a; border-radius:12px; }

.grid { display:grid; grid-template-columns:1.2fr 1fr; gap:20px; }

.table { margin-top:20px; background:#0f172a; padding:20px; border-radius:12px; }

.allow { color:#00ff88; }
.flag { color:#ffaa00; }
.block { color:#ff4444; }

.live-dot {
    width:8px; height:8px;
    background:#00ff88;
    border-radius:50%;
    display:inline-block;
    animation:pulse 1.5s infinite;
}

@keyframes pulse {
    0%{opacity:0.4;}50%{opacity:1;}100%{opacity:0.4;}
}
</style>
</head>

<body>

<div class="container">

<div class="header">
    <h2>ACE Compliance Monitor</h2>
    <div><span class="live-dot"></span> Live</div>
</div>

<div class="grid">

<div>
<div class="stats">
<div class="card">Total {{ total }}</div>
<div class="card">Blocked {{ blocked }}</div>
<div class="card">Flagged {{ flagged }}</div>
</div>

<canvas id="trend"></canvas>
</div>

<div>
<canvas id="pie"></canvas>
</div>

</div>

<div class="table">
<table width="100%">
<tr><th>ID</th><th>Amount</th><th>Decision</th></tr>
{% for t in transactions %}
<tr>
<td>{{t.id}}</td>
<td>{{t.amount}}</td>
<td class="{{t.decision|lower}}">{{t.decision}}</td>
</tr>
{% endfor %}
</table>
</div>

</div>

<script>
// pie
new Chart(document.getElementById('pie'), {
type:'doughnut',
data:{
labels:['Allow','Flag','Block'],
datasets:[{
data:[{{allow}},{{flag}},{{block}}],
backgroundColor:['#00ff88','#ffaa00','#ff4444']
}]
},
options:{cutout:'70%'}
});

// trend
new Chart(document.getElementById('trend'), {
type:'line',
data:{
labels:{{timestamps|tojson}},
datasets:[{
data:{{counts|tojson}},
borderColor:'#00ff88'
}]
}
});

// auto refresh
setInterval(()=>location.reload(),8000);
</script>

</body>
</html>
