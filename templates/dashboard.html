<!DOCTYPE html>
<html>
<head>
    <title>ACE Core</title>

    <meta name="google-adsense-account" content="ca-pub-478039175540164">

    <link rel="icon" type="image/png" href="/static/favicon.png">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

    <style>
        body {
            margin: 0;
            background: #020409;
            font-family: monospace;
            color: #d1d5db;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            padding: 30px;
        }

        h1 {
            font-size: 14px;
            color: #6b7280;
        }

        input, button {
            padding: 8px;
            margin: 5px;
            background: #111827;
            border: 1px solid #1f2937;
            color: #e5e7eb;
        }

        .cards {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }

        .card {
            flex: 1;
            padding: 15px;
            border: 1px solid #111827;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        td, th {
            padding: 8px;
            border-bottom: 1px solid #111827;
        }

        .allow { color: #22c55e; }
        .block { color: #ef4444; }
        .flag { color: #eab308; }
    </style>
</head>

<body>

<div class="container">

    <h1>ACE CORE SYSTEM</h1>

    <form method="POST" action="/add_tx">
        <input type="number" name="amount" placeholder="Amount">
        <button>EXECUTE</button>
    </form>

    <div>
        <a href="/export"><button>EXPORT</button></a>
        <a href="/upgrade"><button>UPGRADE</button></a>
        <a href="/config"><button>CONFIG</button></a>
        <a href="/logout"><button>LOGOUT</button></a>
    </div>

    <div class="cards">
        <div class="card">Total: <span id="total">{{ total }}</span></div>
        <div class="card">Blocked: <span id="blocked">{{ blocked }}</span></div>
        <div class="card">Flagged: <span id="flagged">{{ flagged }}</span></div>
    </div>

    <canvas id="chart"></canvas>

    <table id="txTable">
        <tr>
            <th>ID</th>
            <th>Amount</th>
            <th>Risk</th>
            <th>Status</th>
            <th>Reason</th>
        </tr>

        {% for t in transactions %}
        <tr>
            <td>{{ t.id }}</td>
            <td>{{ t.amount }}</td>
            <td>{{ t.risk }}</td>
            <td class="{% if t.decision=='Allow' %}allow{% elif t.decision=='Block' %}block{% else %}flag{% endif %}">
                {{ t.decision }}
            </td>
            <td>{{ t.reason }}</td>
        </tr>
        {% endfor %}
    </table>

</div>

<script>
const socket = io();

let total = {{ total }};
let blocked = {{ blocked }};
let flagged = {{ flagged }};

const chart = new Chart(document.getElementById("chart"), {
    type: 'line',
    data: {
        labels: [],
        datasets: [{
            data: [],
            borderColor: '#3b82f6'
        }]
    }
});

socket.on("new_tx", function(t) {

    const table = document.getElementById("txTable");

    let cls = t.decision === "Allow" ? "allow" :
              t.decision === "Block" ? "block" : "flag";

    table.insertAdjacentHTML("beforeend", `
        <tr>
            <td>${t.id}</td>
            <td>${t.amount}</td>
            <td>${t.risk}</td>
            <td class="${cls}">${t.decision}</td>
            <td>${t.reason}</td>
        </tr>
    `);

    total++;
    if (t.decision === "Block") blocked++;
    if (t.decision === "Flag") flagged++;

    document.getElementById("total").innerText = total;
    document.getElementById("blocked").innerText = blocked;
    document.getElementById("flagged").innerText = flagged;

    chart.data.labels.push(t.id);
    chart.data.datasets[0].data.push(t.risk);
    chart.update();
});
</script>

</body>
</html>
